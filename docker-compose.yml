services:
  redis:
    image: redis:alpine
    container_name: redis_container
    ports:
      - "6379:6379"
    networks:
      - rede-eleicao
    restart: always

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq_container
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - rede-eleicao
    restart: always

  api:
    build: .
    container_name: fastapi_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - redis
      - rabbitmq
    networks:
      - rede-eleicao
    restart: always

  worker:
    build: .
    container_name: python_worker
    command: python worker.py
    volumes:
      - .:/app
    depends_on:
      - redis
      - rabbitmq
    networks:
      - rede-eleicao
    restart: always

networks:
  rede-eleicao:
    driver: bridge